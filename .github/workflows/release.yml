name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            bun-target: bun-linux-x64
            sidecar-triple: x86_64-unknown-linux-gnu
            sidecar-ext: ''
          - platform: macos-latest
            bun-target: bun-darwin-arm64
            sidecar-triple: aarch64-apple-darwin
            sidecar-ext: ''
          - platform: windows-latest
            bun-target: bun-windows-x64
            sidecar-triple: x86_64-pc-windows-msvc
            sidecar-ext: '.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2t64

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Verify dependency manifest is frozen
        shell: bash
        run: |
          if grep -q 'PLACEHOLDER_FROZEN_AT_RELEASE\|PLACEHOLDER_TBD_AT_RELEASE' server/src/data/dependency-manifest.json; then
            echo "::error::Manifest contains placeholders. Run 'bun scripts/freeze-manifest.ts' before tagging."
            exit 1
          fi
          echo "Manifest is frozen."

      - name: Install frontend dependencies
        run: bun install

      - name: Build server sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          bun build --compile --target=${{ matrix.bun-target }} server/src/index.ts \
            --outfile "src-tauri/binaries/alacrity-server-${{ matrix.sidecar-triple }}${{ matrix.sidecar-ext }}"

      - name: Build mGBA core library (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get install -y \
            liblua5.4-dev \
            libzip-dev \
            libpng-dev
          git clone --depth 1 --branch 0.11.0 https://github.com/mgba-emu/mgba.git /tmp/mgba
          cmake -S /tmp/mgba -B /tmp/mgba/build \
            -DBUILD_QT=OFF \
            -DBUILD_SDL=OFF \
            -DBUILD_LIBRETRO=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_SQLITE3=OFF \
            -DUSE_EDITLINE=OFF \
            -DUSE_ELF=OFF \
            -DUSE_DISCORD_RPC=OFF \
            -DUSE_DEBUGGERS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/mgba/build --target mgba -j "$(nproc)"

      - name: Compile hunt binaries and bundle libmgba (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          MGBA_SRC=/tmp/mgba MGBA_BUILD=/tmp/mgba/build ./scripts/build-hunters.sh
          ls -la scripts/shiny_hunter_* scripts/libmgba.so*

      - name: Stub hunt binaries and libmgba (non-Linux)
        if: matrix.platform != 'ubuntu-latest'
        shell: bash
        run: |
          # TODO: real mGBA build + linking on macOS/Windows. For now, empty
          # stubs so Tauri's resource bundler succeeds, but core-engine hunts
          # will be non-functional on packaged macOS/Windows releases.
          cd scripts
          touch shiny_hunter_core shiny_hunter_wild shiny_hunter_egg libmgba.so.0.11

      - name: Seed pre-bundled database
        shell: bash
        run: |
          mkdir -p data
          bun server/src/seed.ts || echo "Seed already complete"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub runners don't have FUSE kernel module — make AppImages
          # extract instead of self-mount.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Alacrity ${{ github.ref_name }}'
          releaseBody: |
            See the [changelog](https://github.com/smccourtb/alacrity/blob/main/CHANGELOG.md) for details.

            **⚠️ Alpha software** — expect breaking changes.
          releaseDraft: true
          prerelease: true
