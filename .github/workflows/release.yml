name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            bun-target: bun-linux-x64
            sidecar-triple: x86_64-unknown-linux-gnu
            sidecar-ext: ''
          - platform: macos-latest
            bun-target: bun-darwin-arm64
            sidecar-triple: aarch64-apple-darwin
            sidecar-ext: ''
          - platform: windows-latest
            bun-target: bun-windows-x64
            sidecar-triple: x86_64-pc-windows-msvc
            sidecar-ext: '.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2t64

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: tools/rtc-relay/go.sum

      - name: Build rtc-relay
        shell: bash
        working-directory: tools/rtc-relay
        run: |
          go build -o rtc-relay .
          # Tauri's resource bundler expects both names to exist (the conf
          # lists both rtc-relay and rtc-relay.exe). Stub whichever one Go
          # didn't produce for this platform.
          if [[ "${{ matrix.sidecar-ext }}" == ".exe" ]]; then
            touch rtc-relay
          else
            touch rtc-relay.exe
          fi

      - name: Verify dependency manifest is frozen
        shell: bash
        run: |
          if grep -q 'PLACEHOLDER_FROZEN_AT_RELEASE\|PLACEHOLDER_TBD_AT_RELEASE' server/src/data/dependency-manifest.json; then
            echo "::error::Manifest contains placeholders. Run 'bun scripts/freeze-manifest.ts' before tagging."
            exit 1
          fi
          echo "Manifest is frozen."

      - name: Install frontend dependencies
        run: bun install

      - name: Build server sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          bun build --compile --target=${{ matrix.bun-target }} server/src/index.ts \
            --outfile "src-tauri/binaries/alacrity-server-${{ matrix.sidecar-triple }}${{ matrix.sidecar-ext }}"

      # mGBA commit pinned to the exact state the dev environment's hunt
      # binaries were built against. This is 0.10.0-599-gc80f3afd7 on
      # master, not a release tag — the hunters' C sources were tested
      # against this specific state of the internal gb/input.h header.
      # Bumping this requires verifying the 3 .c files still compile AND
      # that runtime behavior is unchanged (memory reads, signal handling).
      - name: Build mGBA core library (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        env:
          MGBA_COMMIT: c80f3afd7708e2e7d2f0f5175ba21fa2b70a424c
        run: |
          sudo apt-get install -y \
            liblua5.4-dev \
            libzip-dev \
            libpng-dev
          git clone https://github.com/mgba-emu/mgba.git /tmp/mgba
          git -C /tmp/mgba checkout "$MGBA_COMMIT"
          cmake -S /tmp/mgba -B /tmp/mgba/build \
            -DBUILD_QT=OFF \
            -DBUILD_SDL=OFF \
            -DBUILD_LIBRETRO=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_SQLITE3=OFF \
            -DUSE_EDITLINE=OFF \
            -DUSE_ELF=OFF \
            -DUSE_DISCORD_RPC=OFF \
            -DUSE_DEBUGGERS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/mgba/build --target mgba -j "$(nproc)"

      - name: Compile hunt binaries and bundle libmgba (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          MGBA_SRC=/tmp/mgba MGBA_BUILD=/tmp/mgba/build ./scripts/build-hunters.sh
          # Stub the non-Linux libmgba names so tauri.conf.json resources bundler succeeds
          touch scripts/libmgba.0.11.dylib
          ls -la scripts/shiny_hunter_* scripts/libmgba*

      - name: Build mgba-stream and bundle libmgba (Linux)
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          # Streaming bridge: links libmgba (already built above) + libvpx + libopus.
          sudo apt-get install -y libvpx-dev libopus-dev
          make -C tools/mgba-stream MGBA_SRC=/tmp/mgba MGBA_BUILD=/tmp/mgba/build
          # Copy libmgba alongside the binary so its $ORIGIN rpath finds it at runtime.
          LIB_REAL="$(find /tmp/mgba/build -maxdepth 1 -name 'libmgba.so.*.*.*' -type f | head -n 1)"
          SONAME="$(readelf -d "$LIB_REAL" 2>/dev/null | awk '/SONAME/ { gsub(/[][]/,"",$5); print $5 }')"
          cp "$LIB_REAL" "tools/mgba-stream/$SONAME"
          # Bundle codec libs so the binary is self-contained at runtime. Without
          # this, users on clean Ubuntu installs without libvpx9/libopus0 would
          # get a dlopen error at first launch. See notes/streaming-architecture.md
          # "Runtime dependencies" for the full rationale.
          for libname in libvpx libopus; do
            SO_NAME="$(ldd tools/mgba-stream/mgba-stream | awk -v lib="$libname" '$1 ~ lib { print $1; exit }')"
            SO_PATH="$(ldd tools/mgba-stream/mgba-stream | awk -v lib="$libname" '$1 ~ lib { print $3; exit }')"
            if [[ -z "$SO_PATH" || ! -f "$SO_PATH" ]]; then
              echo "::error::$libname not found in mgba-stream's ldd output"
              ldd tools/mgba-stream/mgba-stream
              exit 1
            fi
            cp -L "$SO_PATH" "tools/mgba-stream/$SO_NAME"
          done
          ls -la tools/mgba-stream/

      - name: Build mGBA core library (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          MGBA_COMMIT: c80f3afd7708e2e7d2f0f5175ba21fa2b70a424c
        run: |
          brew install lua libzip libpng cmake
          git clone https://github.com/mgba-emu/mgba.git /tmp/mgba
          git -C /tmp/mgba checkout "$MGBA_COMMIT"
          cmake -S /tmp/mgba -B /tmp/mgba/build \
            -DBUILD_QT=OFF \
            -DBUILD_SDL=OFF \
            -DBUILD_LIBRETRO=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_SQLITE3=OFF \
            -DUSE_EDITLINE=OFF \
            -DUSE_ELF=OFF \
            -DUSE_DISCORD_RPC=OFF \
            -DUSE_DEBUGGERS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MACOSX_RPATH=ON \
            -DCMAKE_INSTALL_NAME_DIR=@rpath
          cmake --build /tmp/mgba/build --target mgba -j "$(sysctl -n hw.ncpu)"

      - name: Compile hunt binaries and bundle libmgba (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          MGBA_SRC=/tmp/mgba
          MGBA_BUILD=/tmp/mgba/build
          DYLIB_REAL="$(find "$MGBA_BUILD" -maxdepth 1 -name 'libmgba.*.dylib' -type f | head -n 1)"
          if [[ -z "$DYLIB_REAL" ]]; then
            echo "::error::No libmgba.*.dylib in $MGBA_BUILD"
            find "$MGBA_BUILD" -name 'libmgba*'
            exit 1
          fi
          echo "Using $(basename "$DYLIB_REAL")"

          for src in shiny_hunter_core shiny_hunter_wild shiny_hunter_egg; do
            cc -O2 -o "scripts/$src" "scripts/${src}.c" \
              -I"$MGBA_SRC/include" \
              -L"$MGBA_BUILD" \
              -Wl,-rpath,@loader_path \
              -lmgba
          done

          cp "$DYLIB_REAL" "scripts/libmgba.0.11.dylib"
          # Rewrite the binaries' install-name reference to match the bundled dylib name
          for bin in scripts/shiny_hunter_core scripts/shiny_hunter_wild scripts/shiny_hunter_egg; do
            OLD_INSTALL="$(otool -L "$bin" | awk '/libmgba/ { print $1; exit }')"
            if [[ -n "$OLD_INSTALL" ]]; then
              install_name_tool -change "$OLD_INSTALL" "@rpath/libmgba.0.11.dylib" "$bin"
            fi
          done
          # Stub the Linux libmgba name so tauri.conf.json resources bundler succeeds
          touch scripts/libmgba.so.0.11
          ls -la scripts/shiny_hunter_* scripts/libmgba*
          otool -L scripts/shiny_hunter_core | head -5

      - name: Build mgba-stream and bundle libmgba (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # Streaming bridge: links libmgba (already built above) + libvpx + libopus.
          brew install libvpx opus
          make -C tools/mgba-stream MGBA_SRC=/tmp/mgba MGBA_BUILD=/tmp/mgba/build
          # Copy libmgba alongside the binary so its @loader_path rpath finds it.
          DYLIB_REAL="$(find /tmp/mgba/build -maxdepth 1 -name 'libmgba.*.dylib' -type f | head -n 1)"
          DYLIB_NAME="$(basename "$DYLIB_REAL")"
          cp "$DYLIB_REAL" "tools/mgba-stream/$DYLIB_NAME"
          # Rewrite the binary's libmgba reference to use @rpath so it picks up the bundled copy.
          OLD_INSTALL="$(otool -L tools/mgba-stream/mgba-stream | awk '/libmgba/ { print $1; exit }')"
          if [[ -n "$OLD_INSTALL" ]]; then
            install_name_tool -change "$OLD_INSTALL" "@rpath/$DYLIB_NAME" tools/mgba-stream/mgba-stream
          fi
          # Bundle codec libs so users don't need Homebrew libvpx/opus installed.
          # otool -L reports the install_name the binary was linked against (usually
          # the Homebrew canonical path); cp -L dereferences the symlink to grab
          # the real dylib, and install_name_tool rewrites the reference to @rpath
          # so @loader_path in the existing rpath picks it up at runtime.
          for libname in libvpx libopus; do
            DEP_INSTALL="$(otool -L tools/mgba-stream/mgba-stream | awk -v lib="$libname" '$1 ~ lib { print $1; exit }')"
            if [[ -z "$DEP_INSTALL" ]]; then
              echo "::error::$libname not found in mgba-stream's otool -L"
              otool -L tools/mgba-stream/mgba-stream
              exit 1
            fi
            DEP_BASENAME="$(basename "$DEP_INSTALL")"
            cp -L "$DEP_INSTALL" "tools/mgba-stream/$DEP_BASENAME"
            install_name_tool -change "$DEP_INSTALL" "@rpath/$DEP_BASENAME" tools/mgba-stream/mgba-stream
          done
          ls -la tools/mgba-stream/
          otool -L tools/mgba-stream/mgba-stream | head -10

      - name: Stub hunt + streaming binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # Windows hunt + mgba-stream binaries are deferred. MSYS2 + mingw-w64
          # + pacman cross-compile of libmgba is doable but adds 10+ min to CI
          # and the C sources include POSIX headers (<unistd.h>, <strings.h>)
          # that only work under mingw, not MSVC. Stub for now; track as
          # a follow-up PR.
          cd scripts
          touch shiny_hunter_core shiny_hunter_wild shiny_hunter_egg \
                libmgba.so.0.11 libmgba.0.11.dylib
          cd ../tools/mgba-stream
          touch mgba-stream

      - name: Seed pre-bundled database
        shell: bash
        run: |
          mkdir -p data
          bun server/src/seed.ts || echo "Seed already complete"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub runners don't have FUSE kernel module — make AppImages
          # extract instead of self-mount.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Alacrity ${{ github.ref_name }}'
          releaseBody: |
            See the [changelog](https://github.com/smccourtb/alacrity/blob/main/CHANGELOG.md) for details.

            **⚠️ Alpha software** — expect breaking changes.
          releaseDraft: true
          prerelease: true
