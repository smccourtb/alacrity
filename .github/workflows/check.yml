name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck client
        run: bun run --cwd client tsc -b

      - name: Typecheck server
        run: bun run --cwd server tsc --noEmit

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stub Tauri bundle inputs
        # cargo check runs Tauri's build script, which validates that
        # externalBin and bundle.resources paths exist. We're not actually
        # building the bundle, just checking the Rust code compiles.
        run: |
          mkdir -p src-tauri/binaries data
          touch src-tauri/binaries/alacrity-server-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/alacrity-server-x86_64-unknown-linux-gnu
          touch data/pokemon.db
          touch scripts/shiny_hunter_core scripts/shiny_hunter_wild scripts/shiny_hunter_egg

      - name: cargo check
        working-directory: src-tauri
        run: cargo check
